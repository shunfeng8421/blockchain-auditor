name: "Contribute Fix Suggestion"
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      finding_id:
        description: "Finding rule ID (e.g. BLK-GO-002)"
        required: true
      repo_url:
        description: "Target repo URL"
        required: true

permissions:
  contents: write
  issues: write

jobs:
  contribute:
    if: github.event.label.name == 'contribute-approved' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install requests pyyaml
      - name: Load finding
        run: |
          python auditor/scripts/load_finding.py             --finding-id "${{ github.event.inputs.finding_id }}"             --repo-url "${{ github.event.inputs.repo_url }}"             --output finding.json
          cat finding.json
      - name: Generate fix suggestion
        run: |
          python auditor/scripts/apply_fix.py             --finding finding.json             --rules auditor/rules/blockchain-audit-rules.txt             --output FIX_SUGGESTION.md
          cat FIX_SUGGESTION.md >> $GITHUB_STEP_SUMMARY
      - name: Post suggestion to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const suggestion = fs.readFileSync("FIX_SUGGESTION.md", "utf8");
            const issue_number = 3;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: suggestion
            });
      - name: Update tracking
        run: |
          python auditor/scripts/update_pr_tracking.py             --finding finding.json             --status "suggested"             --log auditor/logs/events.jsonl
      - name: Commit tracking
        run: |
          git config user.name "blockchain-auditor[bot]"
          git config user.email "blockchain-auditor[bot]@users.noreply.github.com"
          git add auditor/logs/
          git diff --staged --quiet || (git commit -m "[bot] contribute: fix suggestion" && git push)
